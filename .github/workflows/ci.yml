name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q

  build-extension:
    name: build .mcpb bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build bundle (validates manifest + packs)
        run: ./extension/build.sh
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: freshbooks-timesheet-mcpb
          path: extension/*.mcpb
          if-no-files-found: error
